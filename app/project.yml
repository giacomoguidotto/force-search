name: Scry
options:
  bundleIdPrefix: com.giacomo
  deploymentTarget:
    macOS: "13.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true
  createIntermediateGroups: true

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.6.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Automatic

targets:
  Scry:
    type: application
    platform: macOS
    sources:
      - path: Scry
        excludes:
          - "**/*Tests*"
    info:
      path: Scry/App/Info.plist
      properties:
        LSUIElement: true
        CFBundleShortVersionString: "0.0.0"
        CFBundleVersion: "1"
        NSHumanReadableCopyright: "Copyright © 2026 Giacomo. MIT License."
        LSMinimumSystemVersion: "13.0"
        SUFeedURL: "https://scry.guidotto.dev/appcast.xml"
        SUPublicEDKey: "z6kjszjyTcE8HwTP00ZTuCeP73I5CCI70seGdUqyXjE="
    entitlements:
      path: Scry/App/Scry.entitlements
      properties:
        com.apple.security.app-sandbox: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.giacomo.Scry
        INFOPLIST_FILE: Scry/App/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        CODE_SIGN_ENTITLEMENTS: Scry/App/Scry.entitlements
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../Frameworks"
        ENABLE_HARDENED_RUNTIME: true
    postBuildScripts:
      - script: |
          if command -v git &>/dev/null && git rev-parse --git-dir &>/dev/null; then
            VERSION=$(git describe --tags --match 'v[0-9]*' --abbrev=0 2>/dev/null)
            if [ -n "$VERSION" ]; then
              VERSION="${VERSION#v}"
              /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" "${TARGET_BUILD_DIR}/${INFOPLIST_PATH}"
            fi
          fi
        name: Inject Git Version
    dependencies:
      - package: Sparkle
    scheme:
      testTargets:
        - ScryTests
      environmentVariables:
        - variable: SCRY_TESTING
          value: "1"
          isEnabled: true

  ScryTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ScryTests
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.giacomo.ScryTests
        GENERATE_INFOPLIST_FILE: YES
        BUNDLE_LOADER: "$(TEST_HOST)"
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/Scry.app/Contents/MacOS/Scry"
    dependencies:
      - target: Scry

schemes:
  Scry:
    build:
      targets:
        Scry: all
        ScryTests: [test]
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - ScryTests
    profile:
      config: Release
    archive:
      config: Release
