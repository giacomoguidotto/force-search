name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Scry
        run: xcodegen generate

      - name: Build
        working-directory: Scry
        run: |
          set -o pipefail
          xcodebuild \
            -project Scry.xcodeproj \
            -scheme Scry \
            -configuration Debug \
            -destination 'platform=macOS' \
            build \
            | xcpretty

      - name: Run Tests
        working-directory: Scry
        run: |
          set -o pipefail
          xcodebuild \
            -project Scry.xcodeproj \
            -scheme Scry \
            -configuration Debug \
            -destination 'platform=macOS' \
            test \
            | xcpretty

  lint:
    name: Swift Lint
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Check Swift formatting
        run: |
          if command -v swiftformat &> /dev/null; then
            swiftformat --lint Scry/Scry/ || echo "SwiftFormat lint warnings found"
          else
            echo "SwiftFormat not installed, skipping lint"
          fi

  version:
    name: Tag Version
    runs-on: macos-15
    timeout-minutes: 10
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version
        id: bump
        run: |
          bash Scripts/bump-version.sh || echo "skip=true" >> "$GITHUB_OUTPUT"

      - name: Push tag
        if: steps.bump.outputs.skip != 'true'
        run: git push --tags

      - name: Create GitHub Release
        if: steps.bump.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG=$(git describe --tags --abbrev=0)
          gh release create "$TAG" --title "$TAG"

  release:
    name: Build Release
    runs-on: macos-15
    timeout-minutes: 30
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs: [build]

    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: Scry
        run: xcodegen generate

      - name: Build Release
        working-directory: Scry
        run: |
          set -o pipefail
          xcodebuild \
            -project Scry.xcodeproj \
            -scheme Scry \
            -configuration Release \
            -derivedDataPath DerivedData \
            build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Scry.app
          path: Scry/DerivedData/Build/Products/Release/Scry.app
          retention-days: 14
